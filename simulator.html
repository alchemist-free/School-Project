<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Симулятор вулкана</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050200;
    overflow: hidden;
    font-family: 'Crimson Pro', serif;
    color: #F5EDD8;
    user-select: none;
  }

  #canvas-container {
    position: fixed; inset: 0;
  }

  /* ── UI OVERLAY ── */
  #ui {
    position: fixed; z-index: 50;
    bottom: 30px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    pointer-events: none;
  }

  #status-text {
    font-family: 'Cinzel', serif;
    font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,160,60,0.8);
    text-shadow: 0 0 20px rgba(255,100,0,0.6);
    height: 20px; transition: opacity 0.5s;
  }

  #controls {
    display: flex; align-items: center; gap: 16px;
    pointer-events: all;
  }

  /* Power slider */
  .slider-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .slider-label {
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px;
    color: #B0A090; text-transform: uppercase;
  }
  #power-slider {
    -webkit-appearance: none; appearance: none;
    width: 160px; height: 4px;
    background: linear-gradient(90deg, #FF2200, #FF6600, #FFAA00);
    border-radius: 2px; outline: none; cursor: pointer;
  }
  #power-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: #FF6600;
    box-shadow: 0 0 10px #FF4400, 0 0 20px rgba(255,80,0,0.5);
    cursor: pointer;
  }
  #power-value {
    font-family: 'Cinzel', serif; font-size: 11px;
    color: #FF8800; letter-spacing: 1px;
  }

  /* Erupt button */
  #erupt-btn {
    position: relative; overflow: hidden;
    background: none;
    border: 1px solid #FF4400;
    color: #FFAA00;
    font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px 32px; cursor: pointer;
    transition: color 0.3s, box-shadow 0.3s;
  }
  #erupt-btn::before {
    content: ''; position: absolute; inset: 0;
    background: #FF3300;
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.4s ease; z-index: -1;
  }
  #erupt-btn:hover { color: #050200; box-shadow: 0 0 20px rgba(255,60,0,0.5); }
  #erupt-btn:hover::before { transform: scaleX(1); }
  #erupt-btn.erupting {
    color: #050200; border-color: #FFAA00;
    box-shadow: 0 0 30px rgba(255,100,0,0.8);
    animation: btn-pulse 0.5s ease-in-out infinite alternate;
  }
  #erupt-btn.erupting::before { transform: scaleX(1); }
  @keyframes btn-pulse {
    from { box-shadow: 0 0 20px rgba(255,100,0,0.6); }
    to   { box-shadow: 0 0 40px rgba(255,200,0,0.9); }
  }

  /* Stop button */
  #stop-btn {
    background: none; border: 1px solid rgba(255,60,0,0.3);
    color: rgba(255,120,60,0.5);
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px;
    padding: 8px 20px; cursor: pointer;
    text-transform: uppercase; transition: all 0.3s;
    display: none;
  }
  #stop-btn.visible { display: block; }
  #stop-btn:hover { border-color: #FF4400; color: #FF6600; }

  /* Top bar */
  #top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px;
    background: linear-gradient(to bottom, rgba(5,2,0,0.9), transparent);
  }
  #top-bar h1 {
    font-family: 'Cinzel', serif; font-size: 16px; letter-spacing: 3px;
    background: linear-gradient(135deg, #FFAA00, #FF4400);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #back-link {
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px;
    color: #B0A090; text-decoration: none; text-transform: uppercase;
    transition: color 0.3s;
  }
  #back-link:hover { color: #FF8800; }

  /* Hint */
  #hint {
    position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
    font-size: 12px; letter-spacing: 1px; color: rgba(176,160,144,0.5);
    pointer-events: none; white-space: nowrap;
  }

  /* Stats panel */
  #stats-panel {
    position: fixed; top: 56px; right: 20px; z-index: 50;
    display: flex; flex-direction: column; gap: 6px;
    opacity: 0; transition: opacity 0.5s;
  }
  #stats-panel.visible { opacity: 1; }
  .stat-row {
    display: flex; justify-content: space-between; gap: 16px;
    font-size: 12px; letter-spacing: 1px;
    border-bottom: 1px solid rgba(255,100,0,0.15);
    padding-bottom: 4px;
  }
  .stat-label { color: #B0A090; font-style: italic; }
  .stat-val { color: #FF8800; font-family: 'Cinzel', serif; font-size: 11px; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="top-bar">
  <h1>⛰ Симулятор вулкана</h1>
  <a href="index.html" id="back-link">← На сайт</a>
</div>

<div id="hint">Тяни мышью для вращения · Колёсико для зума</div>

<div id="stats-panel">
  <div class="stat-row">
    <span class="stat-label">Температура лавы</span>
    <span class="stat-val" id="stat-temp">—</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Высота выброса</span>
    <span class="stat-val" id="stat-height">—</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Частиц в воздухе</span>
    <span class="stat-val" id="stat-particles">—</span>
  </div>
</div>

<div id="ui">
  <div id="status-text">Вулкан спокоен</div>
  <div id="controls">
    <div class="slider-wrap">
      <span class="slider-label">Сила извержения</span>
      <input type="range" id="power-slider" min="1" max="10" value="5">
      <span id="power-value">5 / 10</span>
    </div>
    <button id="erupt-btn" onclick="startEruption()">🌋 Извергнуть</button>
    <button id="stop-btn" onclick="stopEruption()">Остановить</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════════
//  SCENE SETUP
// ══════════════════════════════════════════════
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
document.getElementById('canvas-container').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0A0502, 0.035);

const camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 200);
camera.position.set(0, 8, 20);
camera.lookAt(0, 2, 0);

// ══════════════════════════════════════════════
//  LIGHTING
// ══════════════════════════════════════════════
const ambientLight = new THREE.AmbientLight(0x1A0800, 1.2);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xFF6600, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// Lava glow light (inside crater)
const craterLight = new THREE.PointLight(0xFF4400, 0, 8);
craterLight.position.set(0, 7.2, 0);
scene.add(craterLight);

// Sky rim light
const rimLight = new THREE.DirectionalLight(0x220808, 0.5);
rimLight.position.set(-5, 5, -5);
scene.add(rimLight);

// ══════════════════════════════════════════════
//  GROUND
// ══════════════════════════════════════════════
const groundGeo = new THREE.CircleGeometry(40, 64);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x0D0500 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Ground rings (lava cracks glow)
for (let i = 0; i < 5; i++) {
  const r = 3 + i * 2.5;
  const ringGeo = new THREE.RingGeometry(r, r + 0.06, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xFF2200, side: THREE.DoubleSide,
    transparent: true, opacity: 0.08 + i * 0.02
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.01;
  scene.add(ring);
}

// ══════════════════════════════════════════════
//  VOLCANO BODY
// ══════════════════════════════════════════════
// Build custom lathe volcano shape
const points = [];
const profileData = [
  [0.8, 0],   // base wide
  [3.5, 0.1],
  [5.0, 0.5],
  [5.5, 1.2],
  [5.2, 2.5],
  [4.5, 4.0],
  [3.5, 5.5],
  [2.4, 6.8],
  [1.5, 7.5],
  [0.9, 7.9], // near top
  [0.7, 8.2], // crater rim
];
profileData.forEach(([x, y]) => points.push(new THREE.Vector2(x, y)));

const volcanoGeo = new THREE.LatheGeometry(points, 64);

// Vertex color for lava veins effect
const posAttr = volcanoGeo.attributes.position;
const colors = new Float32Array(posAttr.count * 3);
for (let i = 0; i < posAttr.count; i++) {
  const y = posAttr.getY(i);
  const t = y / 8.5;
  // Dark rock with slight orange tint toward base
  const r = 0.12 + (1 - t) * 0.06;
  const g = 0.06 + (1 - t) * 0.02;
  const b = 0.03;
  colors[i * 3]     = r;
  colors[i * 3 + 1] = g;
  colors[i * 3 + 2] = b;
}
volcanoGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const volcanoMat = new THREE.MeshLambertMaterial({
  vertexColors: true,
});
const volcano = new THREE.Mesh(volcanoGeo, volcanoMat);
volcano.castShadow = true;
volcano.receiveShadow = true;
scene.add(volcano);

// Crater inner glow disc
const craterGeo = new THREE.CircleGeometry(0.65, 32);
const craterMat = new THREE.MeshBasicMaterial({ color: 0xFF2200 });
const craterDisc = new THREE.Mesh(craterGeo, craterMat);
craterDisc.rotation.x = -Math.PI / 2;
craterDisc.position.set(0, 8.22, 0);
scene.add(craterDisc);

// Lava glow sprite at crater
const glowCanvas = document.createElement('canvas');
glowCanvas.width = glowCanvas.height = 128;
const gc = glowCanvas.getContext('2d');
const grad = gc.createRadialGradient(64, 64, 0, 64, 64, 64);
grad.addColorStop(0,   'rgba(255,200,50,0.9)');
grad.addColorStop(0.3, 'rgba(255,80,0,0.6)');
grad.addColorStop(1,   'rgba(255,0,0,0)');
gc.fillStyle = grad;
gc.fillRect(0, 0, 128, 128);
const glowTex = new THREE.CanvasTexture(glowCanvas);
const glowMat = new THREE.SpriteMaterial({ map: glowTex, transparent: true, opacity: 0.0, blending: THREE.AdditiveBlending });
const glowSprite = new THREE.Sprite(glowMat);
glowSprite.scale.set(4, 4, 1);
glowSprite.position.set(0, 8.5, 0);
scene.add(glowSprite);

// ══════════════════════════════════════════════
//  STARS
// ══════════════════════════════════════════════
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 1200; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  const r     = 80 + Math.random() * 20;
  starVerts.push(
    r * Math.sin(phi) * Math.cos(theta),
    Math.abs(r * Math.cos(phi)) + 2,
    r * Math.sin(phi) * Math.sin(theta)
  );
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const starMat = new THREE.PointsMaterial({ color: 0xFFEEDD, size: 0.3, transparent: true, opacity: 0.6 });
scene.add(new THREE.Points(starGeo, starMat));

// ══════════════════════════════════════════════
//  PARTICLE SYSTEM
// ══════════════════════════════════════════════
const MAX_PARTICLES = 2000;

// Lava particles
const lavaPositions = new Float32Array(MAX_PARTICLES * 3);
const lavaVelocities = [];
const lavaLife = new Float32Array(MAX_PARTICLES);
const lavaColors = new Float32Array(MAX_PARTICLES * 3);
const lavaSizes = new Float32Array(MAX_PARTICLES);

for (let i = 0; i < MAX_PARTICLES; i++) {
  lavaLife[i] = 0;
  lavaVelocities.push({ x: 0, y: 0, z: 0 });
}

const lavaGeo = new THREE.BufferGeometry();
lavaGeo.setAttribute('position', new THREE.BufferAttribute(lavaPositions, 3));
lavaGeo.setAttribute('color',    new THREE.BufferAttribute(lavaColors, 3));
lavaGeo.setAttribute('size',     new THREE.BufferAttribute(lavaSizes, 1));

// Particle texture
const pCanvas = document.createElement('canvas');
pCanvas.width = pCanvas.height = 32;
const pc = pCanvas.getContext('2d');
const pg = pc.createRadialGradient(16, 16, 0, 16, 16, 16);
pg.addColorStop(0,   'rgba(255,255,255,1)');
pg.addColorStop(0.4, 'rgba(255,120,0,0.8)');
pg.addColorStop(1,   'rgba(255,0,0,0)');
pc.fillStyle = pg;
pc.fillRect(0, 0, 32, 32);
const pTex = new THREE.CanvasTexture(pCanvas);

const lavaMat = new THREE.ShaderMaterial({
  uniforms: { map: { value: pTex } },
  vertexShader: `
    attribute float size;
    attribute vec3 color;
    varying vec3 vColor;
    varying float vOpacity;
    void main() {
      vColor = color;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vOpacity = clamp(1.0 - (-mv.z - 5.0) / 30.0, 0.0, 1.0);
      gl_PointSize = size * (300.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    uniform sampler2D map;
    varying vec3 vColor;
    varying float vOpacity;
    void main() {
      vec4 tex = texture2D(map, gl_PointCoord);
      gl_FragColor = vec4(vColor, tex.a * vOpacity);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: true
});

const lavaParticles = new THREE.Points(lavaGeo, lavaMat);
scene.add(lavaParticles);

// ── SMOKE particles ──
const MAX_SMOKE = 300;
const smokePos = new Float32Array(MAX_SMOKE * 3);
const smokeVel = [];
const smokeLife = new Float32Array(MAX_SMOKE);
const smokeCol = new Float32Array(MAX_SMOKE * 3);
const smokeSz  = new Float32Array(MAX_SMOKE);

for (let i = 0; i < MAX_SMOKE; i++) {
  smokeLife[i] = 0;
  smokeVel.push({ x: 0, y: 0, z: 0 });
}

const smokeGeo = new THREE.BufferGeometry();
smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePos, 3));
smokeGeo.setAttribute('color',    new THREE.BufferAttribute(smokeCol, 3));
smokeGeo.setAttribute('size',     new THREE.BufferAttribute(smokeSz, 1));

const smokeCanvas = document.createElement('canvas');
smokeCanvas.width = smokeCanvas.height = 64;
const sc = smokeCanvas.getContext('2d');
const sg = sc.createRadialGradient(32, 32, 0, 32, 32, 32);
sg.addColorStop(0,   'rgba(160,140,120,0.4)');
sg.addColorStop(0.5, 'rgba(80,70,60,0.15)');
sg.addColorStop(1,   'rgba(0,0,0,0)');
sc.fillStyle = sg;
sc.fillRect(0, 0, 64, 64);
const smokeTex = new THREE.CanvasTexture(smokeCanvas);

const smokeMat = new THREE.ShaderMaterial({
  uniforms: { map: { value: smokeTex } },
  vertexShader: `
    attribute float size;
    attribute vec3 color;
    varying vec3 vColor;
    varying float vAlpha;
    void main() {
      vColor = color;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vAlpha = clamp(1.0 - (-mv.z) / 50.0, 0.0, 0.6);
      gl_PointSize = size * (400.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    uniform sampler2D map;
    varying vec3 vColor;
    varying float vAlpha;
    void main() {
      vec4 tex = texture2D(map, gl_PointCoord);
      gl_FragColor = vec4(vColor, tex.a * vAlpha);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.NormalBlending,
  vertexColors: true
});

const smokeParticles = new THREE.Points(smokeGeo, smokeMat);
scene.add(smokeParticles);

// ══════════════════════════════════════════════
//  LAVA FLOWS on volcano surface
// ══════════════════════════════════════════════
const lavaFlows = [];
function createLavaFlow() {
  const angle = Math.random() * Math.PI * 2;
  const points3d = [];
  let x = Math.sin(angle) * 0.7;
  let z = Math.cos(angle) * 0.7;
  let y = 8.1;
  for (let i = 0; i < 20; i++) {
    points3d.push(new THREE.Vector3(x, y, z));
    const r = 0.6 + (8.1 - y) * 0.5;
    x = Math.sin(angle) * r + (Math.random() - 0.5) * 0.3;
    z = Math.cos(angle) * r + (Math.random() - 0.5) * 0.3;
    y -= 0.38;
  }
  const curve = new THREE.CatmullRomCurve3(points3d);
  const flowGeo = new THREE.TubeGeometry(curve, 20, 0.08 + Math.random() * 0.07, 6, false);
  const flowMat = new THREE.MeshBasicMaterial({
    color: 0xFF3300, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending
  });
  const flow = new THREE.Mesh(flowGeo, flowMat);
  scene.add(flow);
  lavaFlows.push({ mesh: flow, mat: flowMat, age: 0, maxAge: 4 + Math.random() * 3 });
}

// ══════════════════════════════════════════════
//  CAMERA ORBIT CONTROLS (manual)
// ══════════════════════════════════════════════
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0, phi: Math.PI / 5, r: 20 };
const TARGET = new THREE.Vector3(0, 3, 0);

function updateCamera() {
  camera.position.x = TARGET.x + spherical.r * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = TARGET.y + spherical.r * Math.cos(spherical.phi);
  camera.position.z = TARGET.z + spherical.r * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(TARGET);
}
updateCamera();

// Mouse
renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  spherical.theta -= dx * 0.008;
  spherical.phi = Math.max(0.15, Math.min(Math.PI / 2.2, spherical.phi + dy * 0.006));
  prevMouse = { x: e.clientX, y: e.clientY };
  updateCamera();
});
renderer.domElement.addEventListener('wheel', e => {
  spherical.r = Math.max(8, Math.min(45, spherical.r + e.deltaY * 0.02));
  updateCamera();
});

// Touch
let touches = [];
renderer.domElement.addEventListener('touchstart', e => { touches = Array.from(e.touches); });
renderer.domElement.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && touches.length === 1) {
    const dx = e.touches[0].clientX - touches[0].clientX;
    const dy = e.touches[0].clientY - touches[0].clientY;
    spherical.theta -= dx * 0.008;
    spherical.phi = Math.max(0.15, Math.min(Math.PI / 2.2, spherical.phi + dy * 0.006));
    updateCamera();
  } else if (e.touches.length === 2 && touches.length === 2) {
    const d0 = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
    const d1 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    spherical.r = Math.max(8, Math.min(45, spherical.r - (d1 - d0) * 0.05));
    updateCamera();
  }
  touches = Array.from(e.touches);
});

// ══════════════════════════════════════════════
//  ERUPTION STATE
// ══════════════════════════════════════════════
let erupting = false;
let eruptionPower = 5;
let eruptionTime = 0;
let particleIndex = 0;
let smokeIndex = 0;
let flowTimer = 0;
let cameraShake = 0;

const statusEl    = document.getElementById('status-text');
const eruptBtn    = document.getElementById('erupt-btn');
const stopBtn     = document.getElementById('stop-btn');
const statsPanel  = document.getElementById('stats-panel');
const statTemp    = document.getElementById('stat-temp');
const statHeight  = document.getElementById('stat-height');
const statPart    = document.getElementById('stat-particles');
const powerSlider = document.getElementById('power-slider');
const powerVal    = document.getElementById('power-value');

powerSlider.addEventListener('input', () => {
  eruptionPower = parseInt(powerSlider.value);
  powerVal.textContent = `${eruptionPower} / 10`;
});

function startEruption() {
  erupting = true;
  eruptionTime = 0;
  eruptBtn.classList.add('erupting');
  eruptBtn.textContent = '🌋 Извержение!';
  stopBtn.classList.add('visible');
  statsPanel.classList.add('visible');
  statusEl.textContent = 'Началось извержение!';
}

function stopEruption() {
  erupting = false;
  eruptBtn.classList.remove('erupting');
  eruptBtn.textContent = '🌋 Извергнуть';
  stopBtn.classList.remove('visible');
  statusEl.textContent = 'Вулкан успокаивается...';
  setTimeout(() => { statusEl.textContent = 'Вулкан спокоен'; }, 3000);
  statsPanel.classList.remove('visible');
}

function spawnLavaParticle() {
  const i = particleIndex % MAX_PARTICLES;
  particleIndex++;
  const power = eruptionPower / 10;
  const spread = 0.4 + power * 0.6;
  lavaPositions[i * 3]     = (Math.random() - 0.5) * 0.8;
  lavaPositions[i * 3 + 1] = 8.3;
  lavaPositions[i * 3 + 2] = (Math.random() - 0.5) * 0.8;
  const speed = 4 + power * 12 + Math.random() * 4;
  const angle = Math.random() * Math.PI * 2;
  const tilt  = Math.random() * spread;
  lavaVelocities[i] = {
    x: Math.sin(angle) * tilt * speed * 0.4,
    y: speed,
    z: Math.cos(angle) * tilt * speed * 0.4
  };
  lavaLife[i] = 1.0;
  // Color: white → yellow → orange → red
  const heat = 0.5 + Math.random() * 0.5;
  lavaColors[i * 3]     = 1.0;
  lavaColors[i * 3 + 1] = heat * 0.7;
  lavaColors[i * 3 + 2] = heat * 0.1;
  lavaSizes[i] = 0.3 + Math.random() * 0.5 * power;
}

function spawnSmoke() {
  const i = smokeIndex % MAX_SMOKE;
  smokeIndex++;
  const power = eruptionPower / 10;
  smokePos[i * 3]     = (Math.random() - 0.5) * 1.2;
  smokePos[i * 3 + 1] = 8.8 + Math.random();
  smokePos[i * 3 + 2] = (Math.random() - 0.5) * 1.2;
  const spd = 1.5 + power * 2;
  smokeVel[i] = {
    x: (Math.random() - 0.5) * 0.8,
    y: spd,
    z: (Math.random() - 0.5) * 0.8
  };
  smokeLife[i] = 1.0;
  const grey = 0.3 + Math.random() * 0.25;
  smokeCol[i * 3]     = grey + 0.1;
  smokeCol[i * 3 + 1] = grey;
  smokeCol[i * 3 + 2] = grey * 0.8;
  smokeSz[i] = 1.5 + Math.random() * 3 * power;
}

// ══════════════════════════════════════════════
//  ANIMATION LOOP
// ══════════════════════════════════════════════
const clock = new THREE.Clock();
let activeParticles = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const power = eruptionPower / 10;

  // ── Spawn particles ──
  if (erupting) {
    eruptionTime += dt;
    const spawnRate = Math.floor(5 + power * 25);
    for (let s = 0; s < spawnRate; s++) spawnLavaParticle();
    const smokeRate = Math.floor(2 + power * 8);
    for (let s = 0; s < smokeRate; s++) spawnSmoke();

    // Lava flows
    flowTimer += dt;
    if (flowTimer > 0.8 - power * 0.5) {
      flowTimer = 0;
      if (lavaFlows.length < 12) createLavaFlow();
    }

    cameraShake = power * 0.08;
    craterLight.intensity = 3 + power * 5 + Math.sin(eruptionTime * 12) * power * 2;
    glowSprite.material.opacity = 0.4 + power * 0.5;

    // Stats
    statTemp.textContent   = `${Math.floor(900 + power * 400)} °C`;
    statHeight.textContent = `${Math.floor(1 + power * 25)} км`;
  } else {
    craterLight.intensity = Math.max(0, craterLight.intensity - dt * 3);
    glowSprite.material.opacity = Math.max(0, glowSprite.material.opacity - dt * 0.5);
    cameraShake *= 0.9;
  }

  // ── Update lava particles ──
  activeParticles = 0;
  for (let i = 0; i < MAX_PARTICLES; i++) {
    if (lavaLife[i] <= 0) continue;
    activeParticles++;
    lavaLife[i] -= dt * (0.3 + power * 0.2);
    const v = lavaVelocities[i];
    v.y -= 9.8 * dt; // gravity
    lavaPositions[i * 3]     += v.x * dt;
    lavaPositions[i * 3 + 1] += v.y * dt;
    lavaPositions[i * 3 + 2] += v.z * dt;
    // Cool down: shift color to dark red
    const life = lavaLife[i];
    lavaColors[i * 3]     = life;
    lavaColors[i * 3 + 1] = life * 0.4 * (0.3 + life * 0.7);
    lavaColors[i * 3 + 2] = 0;
    lavaSizes[i] = Math.max(0, lavaSizes[i] - dt * 0.2);
    if (lavaPositions[i * 3 + 1] < 0) lavaLife[i] = 0;
  }
  lavaGeo.attributes.position.needsUpdate = true;
  lavaGeo.attributes.color.needsUpdate    = true;
  lavaGeo.attributes.size.needsUpdate     = true;

  // ── Update smoke ──
  for (let i = 0; i < MAX_SMOKE; i++) {
    if (smokeLife[i] <= 0) continue;
    smokeLife[i] -= dt * 0.18;
    const sv = smokeVel[i];
    sv.x += (Math.random() - 0.5) * 0.3 * dt;
    sv.z += (Math.random() - 0.5) * 0.3 * dt;
    smokePos[i * 3]     += sv.x * dt;
    smokePos[i * 3 + 1] += sv.y * dt;
    smokePos[i * 3 + 2] += sv.z * dt;
    smokeSz[i] += dt * 2;
    // Fade out
    const a = smokeLife[i] * 0.4;
    smokeCol[i * 3]     = a * 0.8;
    smokeCol[i * 3 + 1] = a * 0.7;
    smokeCol[i * 3 + 2] = a * 0.6;
  }
  smokeGeo.attributes.position.needsUpdate = true;
  smokeGeo.attributes.color.needsUpdate    = true;
  smokeGeo.attributes.size.needsUpdate     = true;

  // ── Update lava flows ──
  for (let fi = lavaFlows.length - 1; fi >= 0; fi--) {
    const f = lavaFlows[fi];
    f.age += dt;
    const progress = f.age / f.maxAge;
    if (progress < 0.2) {
      f.mat.opacity = progress / 0.2 * 0.7;
    } else if (progress > 0.7) {
      f.mat.opacity = (1 - (progress - 0.7) / 0.3) * 0.7;
    } else {
      f.mat.opacity = 0.7;
    }
    if (f.age >= f.maxAge) {
      scene.remove(f.mesh);
      lavaFlows.splice(fi, 1);
    }
  }

  // ── Camera shake ──
  if (cameraShake > 0.001) {
    const sx = (Math.random() - 0.5) * cameraShake;
    const sy = (Math.random() - 0.5) * cameraShake;
    camera.position.x += sx;
    camera.position.y += sy;
  }

  // ── Ambient volcano breathe (idle) ──
  if (!erupting) {
    craterLight.intensity = 0.3 + Math.sin(Date.now() * 0.002) * 0.2;
    glowSprite.material.opacity = 0.05 + Math.sin(Date.now() * 0.002) * 0.04;
  }

  // Stats update
  if (erupting) statPart.textContent = activeParticles;

  renderer.render(scene, camera);
}

animate();

// ── Resize ──
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
