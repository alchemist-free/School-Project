<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Симулятор вулкана</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#050200; touch-action:none; }
  canvas { display:block; position:fixed; inset:0; }

  #top-bar {
    position:fixed; top:0; left:0; right:0; z-index:10;
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 18px;
    background:linear-gradient(to bottom, rgba(5,2,0,0.95) 70%, transparent);
    pointer-events:none;
  }
  #top-bar h1 {
    font-family:'Cinzel',serif; font-size:15px; letter-spacing:2px;
    color:#FF8800; pointer-events:none;
  }
  #back-link {
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px;
    color:#B0A090; text-decoration:none; text-transform:uppercase;
    transition:color .3s; pointer-events:all;
  }

  #ui {
    position:fixed; bottom:0; left:0; right:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    padding:12px 16px 22px;
    background:linear-gradient(to top, rgba(5,2,0,0.97) 65%, transparent);
  }
  #status {
    font-family:'Cinzel',serif; font-size:12px; letter-spacing:3px;
    text-transform:uppercase; color:#FF8800;
    text-shadow:0 0 15px rgba(255,120,0,.8); height:18px;
  }
  #ctrl-row {
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:center;
  }
  .slabel { font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; color:#888; text-transform:uppercase; }
  .swrap  { display:flex; flex-direction:column; align-items:center; gap:4px; }
  #pslider {
    -webkit-appearance:none; width:150px; height:5px;
    background:linear-gradient(90deg,#FF2200,#FF6600,#FFAA00);
    border-radius:3px; outline:none; cursor:pointer;
  }
  #pslider::-webkit-slider-thumb {
    -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
    background:#FF6600; box-shadow:0 0 12px #FF4400, 0 0 4px #FF8800;
  }
  #pval { font-family:'Cinzel',serif; font-size:10px; color:#FF8800; letter-spacing:1px; }

  #ebtn {
    font-family:'Cinzel',serif; font-size:12px; letter-spacing:3px; text-transform:uppercase;
    padding:12px 30px; cursor:pointer; border:1px solid #FF4400;
    background:none; color:#FFAA00; position:relative; overflow:hidden; transition:color .3s;
  }
  #ebtn::before {
    content:''; position:absolute; inset:0; background:#FF3300;
    transform:scaleX(0); transform-origin:left; transition:transform .4s; z-index:-1;
  }
  #ebtn:hover::before, #ebtn.on::before { transform:scaleX(1); }
  #ebtn:hover, #ebtn.on { color:#050200; }
  #ebtn.on { border-color:#FFAA00; animation:bp .5s ease-in-out infinite alternate; }
  @keyframes bp {
    from { box-shadow:0 0 15px rgba(255,100,0,.5); }
    to   { box-shadow:0 0 40px rgba(255,220,0,1); }
  }

  #sbtn {
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; text-transform:uppercase;
    padding:9px 20px; cursor:pointer; border:1px solid rgba(255,60,0,.3);
    background:none; color:rgba(255,120,60,.5); transition:all .3s; display:none;
  }
  #sbtn.vis { display:block; }
  #sbtn:hover { border-color:#FF4400; color:#FF6600; }

  #stats {
    position:fixed; top:52px; right:14px; z-index:10;
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:1px;
    opacity:0; transition:opacity .5s;
    background:rgba(5,2,0,.88); padding:10px 14px;
    border-left:2px solid rgba(255,100,0,.4);
  }
  #stats.vis { opacity:1; }
  #stats .r { display:flex; justify-content:space-between; gap:18px; margin-bottom:5px; }
  #stats .l { color:#888; font-style:italic; font-size:10px; }
  #stats .v { color:#FF8800; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="top-bar">
  <h1>⛰ Симулятор вулкана</h1>
  <a href="index.html" id="back-link">← На сайт</a>
</div>

<div id="stats">
  <div class="r"><span class="l">Температура</span><span class="v" id="st">—</span></div>
  <div class="r"><span class="l">Высота выброса</span><span class="v" id="sh">—</span></div>
  <div class="r"><span class="l">Частиц</span><span class="v" id="sp">—</span></div>
</div>

<div id="ui">
  <div id="status">Вулкан спокоен</div>
  <div id="ctrl-row">
    <div class="swrap">
      <span class="slabel">Сила извержения</span>
      <input type="range" id="pslider" min="1" max="10" value="5">
      <span id="pval">5 / 10</span>
    </div>
    <button id="ebtn" onclick="toggleErupt()">🌋 Извергнуть</button>
    <button id="sbtn" onclick="stopErupt()">Стоп</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H, CX, CY, SCALE;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2;
  // Volcano base Y — leave room for UI at bottom (~120px) and top (~50px)
  CY = H - 130;
  SCALE = Math.min(W, H - 200) / 520;
}
resize();
window.addEventListener('resize', resize);

// ── STARS ──
const stars = [];
for (let i = 0; i < 180; i++) {
  stars.push({ x: Math.random(), y: Math.random() * 0.6, r: Math.random() * 1.4 + 0.3, a: Math.random() * 0.7 + 0.3 });
}

// ── PARTICLES ──
const MAX = 1200;
const px  = new Float32Array(MAX);
const py  = new Float32Array(MAX);
const pvx = new Float32Array(MAX);
const pvy = new Float32Array(MAX);
const plife = new Float32Array(MAX);
const pmaxl = new Float32Array(MAX);
const ptype = new Uint8Array(MAX);   // 0=lava 1=smoke 2=ash 3=ember
const psize = new Float32Array(MAX);
let pidx = 0;

function spawn(type, x, y, vx, vy, life, sz) {
  const i = pidx % MAX; pidx++;
  px[i]=x; py[i]=y; pvx[i]=vx; pvy[i]=vy;
  plife[i]=life; pmaxl[i]=life; ptype[i]=type; psize[i]=sz;
}

// ── LAVA FLOWS ──
const flows = [];
function addFlow(pw) {
  const side = Math.random() < 0.5 ? -1 : 1;
  const pts  = [];
  // Start near crater, flow down side
  let fx = CX + side * (12 + Math.random()*8) * SCALE;
  let fy = CY - (280 + Math.random()*20) * SCALE;
  for (let i = 0; i < 18; i++) {
    pts.push({ x: fx, y: fy });
    fx += side * (4 + Math.random()*6) * SCALE;
    fy += (14 + Math.random()*8 + i*1.5) * SCALE * 0.38;
  }
  flows.push({ pts, age: 0, maxAge: 2.5+Math.random()*2.5, pw, side });
}

// ── STATE ──
let erupting = false, power = 5, eTime = 0, flowTimer = 0;
let shakeX = 0, shakeY = 0;

const slider   = document.getElementById('pslider');
const pvalEl   = document.getElementById('pval');
const statusEl = document.getElementById('status');
const eBtn     = document.getElementById('ebtn');
const sBtn     = document.getElementById('sbtn');
const statsEl  = document.getElementById('stats');

slider.addEventListener('input', () => { power = +slider.value; pvalEl.textContent = power + ' / 10'; });

function toggleErupt() {
  if (erupting) { stopErupt(); return; }
  erupting = true; eTime = 0;
  eBtn.classList.add('on'); eBtn.textContent = '🌋 Извержение!';
  sBtn.classList.add('vis'); statsEl.classList.add('vis');
  statusEl.textContent = 'Началось извержение!';
}
function stopErupt() {
  erupting = false;
  eBtn.classList.remove('on'); eBtn.textContent = '🌋 Извергнуть';
  sBtn.classList.remove('vis'); statsEl.classList.remove('vis');
  statusEl.textContent = 'Вулкан успокаивается...';
  setTimeout(() => statusEl.textContent = 'Вулкан спокоен', 3000);
}

// ── DRAW VOLCANO ──
function drawVolcano(sx, sy) {
  const sc = SCALE;
  const bx = CX + sx, by = CY + sy;

  // Shadow / base glow
  const baseGrad = ctx.createRadialGradient(bx, by, 0, bx, by, 280*sc);
  baseGrad.addColorStop(0,   'rgba(180,40,0,0.18)');
  baseGrad.addColorStop(0.5, 'rgba(100,20,0,0.08)');
  baseGrad.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = baseGrad;
  ctx.beginPath(); ctx.ellipse(bx, by, 280*sc, 40*sc, 0, 0, Math.PI*2); ctx.fill();

  // Main volcano body
  ctx.beginPath();
  ctx.moveTo(bx - 240*sc, by);
  ctx.bezierCurveTo(bx - 200*sc, by - 40*sc,  bx - 160*sc, by - 120*sc, bx - 90*sc, by - 200*sc);
  ctx.bezierCurveTo(bx - 55*sc,  by - 260*sc, bx - 30*sc,  by - 300*sc, bx - 18*sc, by - 310*sc);
  ctx.lineTo(bx + 18*sc, by - 310*sc);
  ctx.bezierCurveTo(bx + 30*sc,  by - 300*sc, bx + 55*sc,  by - 260*sc, bx + 90*sc, by - 200*sc);
  ctx.bezierCurveTo(bx + 160*sc, by - 120*sc, bx + 200*sc, by - 40*sc,  bx + 240*sc, by);
  ctx.closePath();
  const bodyGrad = ctx.createLinearGradient(bx - 240*sc, by, bx + 240*sc, by - 310*sc);
  bodyGrad.addColorStop(0,    '#2A1000');
  bodyGrad.addColorStop(0.35, '#1E0B00');
  bodyGrad.addColorStop(0.7,  '#160800');
  bodyGrad.addColorStop(1,    '#0F0500');
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // Rock texture — light side
  ctx.beginPath();
  ctx.moveTo(bx + 18*sc, by - 310*sc);
  ctx.bezierCurveTo(bx + 30*sc, by - 300*sc, bx + 55*sc, by - 260*sc, bx + 90*sc, by - 200*sc);
  ctx.bezierCurveTo(bx + 140*sc, by - 110*sc, bx + 190*sc, by - 50*sc, bx + 230*sc, by - 5*sc);
  ctx.lineTo(bx + 180*sc, by);
  ctx.bezierCurveTo(bx + 155*sc, by - 50*sc, bx + 115*sc, by - 115*sc, bx + 75*sc, by - 195*sc);
  ctx.bezierCurveTo(bx + 48*sc,  by - 258*sc, bx + 27*sc, by - 298*sc, bx + 18*sc, by - 308*sc);
  ctx.closePath();
  ctx.fillStyle = 'rgba(80,30,5,0.18)';
  ctx.fill();

  // Lava veins on surface
  const veinColors = ['rgba(255,60,0,0.13)', 'rgba(255,120,0,0.10)', 'rgba(200,40,0,0.08)'];
  [[bx-60*sc, by-180*sc, bx-110*sc, by-60*sc, bx-160*sc, by-10*sc],
   [bx+50*sc, by-200*sc, bx+100*sc, by-80*sc, bx+155*sc, by-15*sc],
   [bx-10*sc, by-290*sc, bx-30*sc,  by-150*sc, bx-70*sc, by-20*sc]
  ].forEach((v, i) => {
    ctx.beginPath();
    ctx.moveTo(v[0], v[1]);
    ctx.quadraticCurveTo(v[2], v[3], v[4], v[5]);
    ctx.strokeStyle = veinColors[i]; ctx.lineWidth = (3+i)*sc; ctx.stroke();
  });

  // Crater rim
  const rimY = by - 312*sc;
  ctx.beginPath();
  ctx.ellipse(bx, rimY, 22*sc, 6*sc, 0, 0, Math.PI*2);
  ctx.fillStyle = '#3A1200'; ctx.fill();

  // Crater inner glow
  const craterGlow = ctx.createRadialGradient(bx, rimY, 0, bx, rimY, 20*sc);
  const glowIntens = erupting ? 0.55 + (power/10)*0.45 : 0.22 + Math.sin(eTime*2)*0.06;
  craterGlow.addColorStop(0,   `rgba(255,220,60,${glowIntens})`);
  craterGlow.addColorStop(0.4, `rgba(255,80,0,${glowIntens*0.7})`);
  craterGlow.addColorStop(1,   'rgba(255,0,0,0)');
  ctx.beginPath();
  ctx.ellipse(bx, rimY, 20*sc, 7*sc, 0, 0, Math.PI*2);
  ctx.fillStyle = craterGlow; ctx.fill();

  return { craterX: bx, craterY: rimY };
}

// ── DRAW BACKGROUND ──
function drawBg() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#050202');
  sky.addColorStop(0.5, '#0D0400');
  sky.addColorStop(1,   '#180600');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,240,220,${s.a})`; ctx.fill();
  });

  // Horizon lava glow
  const hgGrad = ctx.createRadialGradient(CX, H, 0, CX, H, W*0.8);
  const hInt = erupting ? 0.20 + (power/10)*0.18 : 0.07;
  hgGrad.addColorStop(0,   `rgba(200,50,0,${hInt})`);
  hgGrad.addColorStop(0.5, `rgba(100,20,0,${hInt*0.4})`);
  hgGrad.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = hgGrad; ctx.fillRect(0, 0, W, H);
}

// ── MAIN LOOP ──
let last = performance.now();

function loop() {
  requestAnimationFrame(loop);
  const now = performance.now();
  const dt  = Math.min((now - last) / 1000, 0.05);
  last = now;
  const pw = power / 10;

  eTime += dt;

  // Shake
  if (erupting && pw > 0.3) {
    shakeX = (Math.random()-0.5) * pw * 5;
    shakeY = (Math.random()-0.5) * pw * 3;
  } else {
    shakeX *= 0.8; shakeY *= 0.8;
  }

  // ── BG ──
  drawBg();

  // ── GROUND ──
  ctx.save();
  ctx.translate(shakeX, shakeY);
  const gGrad = ctx.createLinearGradient(0, CY-10, 0, H);
  gGrad.addColorStop(0, '#0D0400'); gGrad.addColorStop(1, '#050200');
  ctx.fillStyle = gGrad;
  ctx.beginPath(); ctx.rect(0, CY-8, W, H - CY + 8); ctx.fill();

  // Ground cracks glow
  for (let i = 0; i < 5; i++) {
    const r = (80 + i*60) * SCALE;
    ctx.beginPath();
    ctx.ellipse(CX, CY, r, r*0.12, 0, 0, Math.PI*2);
    const gi = erupting ? 0.09 - i*0.01 : 0.04 - i*0.005;
    ctx.strokeStyle = `rgba(255,50,0,${Math.max(0,gi)})`; ctx.lineWidth = 1.5; ctx.stroke();
  }
  ctx.restore();

  // ── LAVA FLOWS ──
  ctx.save(); ctx.translate(shakeX, shakeY);
  flows.forEach(f => {
    const prog = f.age / f.maxAge;
    const alpha = prog < 0.15 ? prog/0.15 : prog > 0.65 ? 1-(prog-0.65)/0.35 : 1;
    ctx.beginPath();
    ctx.moveTo(f.pts[0].x, f.pts[0].y);
    for (let i = 1; i < f.pts.length; i++) ctx.lineTo(f.pts[i].x, f.pts[i].y);
    ctx.strokeStyle = `rgba(255,${Math.floor(60+prog*40)},0,${alpha*0.85})`;
    ctx.lineWidth = (4+f.pw*5) * SCALE; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.stroke();
    // Glow layer
    ctx.strokeStyle = `rgba(255,180,0,${alpha*0.25})`; ctx.lineWidth = (8+f.pw*8)*SCALE; ctx.stroke();
  });
  ctx.restore();

  // ── VOLCANO ──
  ctx.save(); ctx.translate(shakeX, shakeY);
  const { craterX, craterY } = drawVolcano(0, 0);
  ctx.restore();

  // ── UPDATE PARTICLES ──
  if (erupting) {
    const cx = craterX + shakeX, cy = craterY + shakeY;

    // Lava
    const lRate = Math.floor(6 + pw*22);
    for (let s = 0; s < lRate; s++) {
      const ang  = -Math.PI/2 + (Math.random()-0.5)*(0.5+pw*1.2);
      const spd  = (180 + pw*280 + Math.random()*80) * SCALE;
      spawn(0, cx+(Math.random()-0.5)*12*SCALE, cy,
        Math.cos(ang)*spd*0.3, Math.sin(ang)*spd,
        0.7+Math.random()*0.5, (5+pw*9+Math.random()*5)*SCALE);
    }
    // Smoke
    const smRate = Math.floor(3 + pw*12);
    for (let s = 0; s < smRate; s++) {
      spawn(1, cx+(Math.random()-0.5)*20*SCALE, cy+(Math.random()-0.5)*10*SCALE,
        (Math.random()-0.5)*40*SCALE, -(30+pw*60+Math.random()*30)*SCALE,
        1.4+Math.random()*0.6, (18+pw*25+Math.random()*15)*SCALE);
    }
    // Ash
    const ashRate = Math.floor(pw*10);
    for (let s = 0; s < ashRate; s++) {
      const ang = -Math.PI/2 + (Math.random()-0.5)*(0.8+pw*1.5);
      const spd = (80+pw*160+Math.random()*60)*SCALE;
      spawn(2, cx+(Math.random()-0.5)*8*SCALE, cy,
        Math.cos(ang)*spd*0.5, Math.sin(ang)*spd,
        1.0+Math.random()*0.4, (3+pw*5)*SCALE);
    }
    // Embers
    if (pw > 0.25) {
      const eRate = Math.floor(pw*14);
      for (let s = 0; s < eRate; s++) {
        const ang = -Math.PI/2 + (Math.random()-0.5)*(0.3+pw*0.9);
        const spd = (220+pw*320+Math.random()*100)*SCALE;
        spawn(3, cx+(Math.random()-0.5)*6*SCALE, cy,
          Math.cos(ang)*spd*0.25, Math.sin(ang)*spd,
          0.5+Math.random()*0.3, (2+pw*4)*SCALE);
      }
    }

    // Flows
    flowTimer += dt;
    if (flowTimer > 0.5 - pw*0.28) {
      flowTimer = 0;
      if (flows.length < Math.floor(4+pw*10)) addFlow(pw);
    }

    // Stats
    document.getElementById('st').textContent = `${900+Math.floor(pw*420)} °C`;
    document.getElementById('sh').textContent = `${(0.5+pw*25).toFixed(1)} км`;
  }

  // ── DRAW + UPDATE PARTICLES ──
  let active = 0;
  for (let i = 0; i < MAX; i++) {
    if (plife[i] <= 0) continue;
    active++;
    const type = ptype[i];

    // Physics
    let grav;
    switch(type) {
      case 0: grav = 380*SCALE; break;  // lava: heavy
      case 1: grav = -15*SCALE; break;  // smoke: rises
      case 2: grav = 120*SCALE; break;  // ash: light fall
      case 3: grav = 340*SCALE; break;  // ember
    }
    pvy[i] += grav * dt;
    if (type===1||type===2) pvx[i] += (Math.random()-0.5)*25*SCALE*dt;
    px[i] += pvx[i]*dt; py[i] += pvy[i]*dt;

    const lf   = plife[i] / pmaxl[i];
    const sz   = type===1 ? psize[i] + dt*25*SCALE : psize[i];
    if (type===1) psize[i] = sz;

    // Draw
    ctx.save();
    ctx.globalCompositeOperation = type===1 ? 'source-over' : 'lighter';

    if (type===0) {
      // Lava blob: hot white → yellow → orange → red
      const r = Math.floor(255);
      const g = Math.floor(lf*lf * 180);
      const b = 0;
      ctx.shadowColor = `rgb(${r},${Math.floor(g*0.5)},0)`;
      ctx.shadowBlur  = sz*1.5;
      ctx.beginPath(); ctx.arc(px[i], py[i], sz*lf, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${b},${lf})`;
      ctx.fill();
    } else if (type===1) {
      // Smoke: grey puff
      const grd = ctx.createRadialGradient(px[i],py[i],0, px[i],py[i],sz);
      const a   = lf*0.28;
      grd.addColorStop(0,   `rgba(140,125,110,${a})`);
      grd.addColorStop(0.5, `rgba(70,62,55,${a*0.5})`);
      grd.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(px[i], py[i], sz, 0, Math.PI*2); ctx.fill();
    } else if (type===2) {
      // Ash: small grey dot
      ctx.beginPath(); ctx.arc(px[i], py[i], sz*lf*0.5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(180,165,150,${lf*0.65})`;
      ctx.fill();
    } else {
      // Ember: tiny bright streak
      ctx.shadowColor = '#FFEE88'; ctx.shadowBlur = sz*3;
      ctx.beginPath(); ctx.arc(px[i], py[i], sz*lf, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,${Math.floor(200+lf*55)},80,${lf})`;
      ctx.fill();
    }
    ctx.restore();

    // Decay
    let decay;
    switch(type) {
      case 0: decay=0.65+pw*0.3; break;
      case 1: decay=0.14;        break;
      case 2: decay=0.32;        break;
      case 3: decay=0.75+pw*0.35; break;
    }
    plife[i] -= dt*decay;
    if (py[i] > CY + 30 || py[i] < -50 || px[i] < -100 || px[i] > W+100) plife[i] = 0;
  }

  if (erupting) document.getElementById('sp').textContent = active;

  // ── UPDATE FLOWS ──
  for (let fi = flows.length-1; fi>=0; fi--) {
    flows[fi].age += dt;
    if (flows[fi].age >= flows[fi].maxAge) flows.splice(fi,1);
  }
}

loop();
</script>
</body>
</html>
