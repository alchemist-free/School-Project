<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Симулятор вулкана</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#050200; overflow:hidden;
    font-family:'Cinzel',serif; color:#F5EDD8;
    touch-action:none;
  }
  canvas { display:block; }

  #top-bar {
    position:fixed; top:0; left:0; right:0; z-index:50;
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 18px;
    background:linear-gradient(to bottom,rgba(5,2,0,0.95),transparent);
  }
  #top-bar h1 { font-size:15px; letter-spacing:2px; color:#FF8800; }
  #back-link {
    font-size:11px; letter-spacing:2px; color:#B0A090;
    text-decoration:none; text-transform:uppercase; transition:color .3s;
  }
  #back-link:hover { color:#FF8800; }

  #ui {
    position:fixed; bottom:0; left:0; right:0; z-index:50;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    padding:14px 16px 20px;
    background:linear-gradient(to top,rgba(5,2,0,0.97) 60%,transparent);
  }
  #status {
    font-size:12px; letter-spacing:3px; text-transform:uppercase;
    color:#FF8800; text-shadow:0 0 15px rgba(255,100,0,.7); height:18px;
  }
  #ctrl-row {
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:center;
  }
  .slider-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .slider-label { font-size:9px; letter-spacing:2px; color:#888; text-transform:uppercase; }
  #power-slider {
    -webkit-appearance:none; width:140px; height:4px;
    background:linear-gradient(90deg,#FF2200,#FF6600,#FFAA00);
    border-radius:2px; outline:none; cursor:pointer;
  }
  #power-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
    background:#FF6600; box-shadow:0 0 10px #FF4400; cursor:pointer;
  }
  #power-val { font-size:10px; color:#FF8800; letter-spacing:1px; }

  #erupt-btn {
    background:none; border:1px solid #FF4400; color:#FFAA00;
    font-family:'Cinzel',serif; font-size:12px; letter-spacing:3px;
    text-transform:uppercase; padding:11px 28px; cursor:pointer;
    transition:all .3s; position:relative; overflow:hidden;
  }
  #erupt-btn::before {
    content:''; position:absolute; inset:0; background:#FF3300;
    transform:scaleX(0); transform-origin:left; transition:transform .4s; z-index:-1;
  }
  #erupt-btn:hover,#erupt-btn.on { color:#050200; }
  #erupt-btn.on::before,#erupt-btn:hover::before { transform:scaleX(1); }
  #erupt-btn.on { border-color:#FFAA00; animation:bpulse .5s ease-in-out infinite alternate; }
  @keyframes bpulse {
    from { box-shadow:0 0 15px rgba(255,100,0,.5); }
    to   { box-shadow:0 0 35px rgba(255,200,0,.9); }
  }
  #stop-btn {
    background:none; border:1px solid rgba(255,60,0,.3); color:rgba(255,120,60,.5);
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px;
    padding:8px 18px; cursor:pointer; text-transform:uppercase;
    transition:all .3s; display:none;
  }
  #stop-btn.vis { display:block; }
  #stop-btn:hover { border-color:#FF4400; color:#FF6600; }

  #stats {
    position:fixed; top:52px; right:14px; z-index:50;
    font-size:11px; letter-spacing:1px; opacity:0; transition:opacity .5s;
    background:rgba(5,2,0,.85); padding:10px 14px;
    border-left:1px solid rgba(255,100,0,.3);
  }
  #stats.vis { opacity:1; }
  #stats .row { display:flex; justify-content:space-between; gap:20px; margin-bottom:4px; }
  #stats .lbl { color:#888; font-style:italic; font-family:serif; }
  #stats .val { color:#FF8800; }

  #hint {
    position:fixed; top:50px; left:50%; transform:translateX(-50%);
    font-size:11px; letter-spacing:1px; color:rgba(176,160,144,.4);
    pointer-events:none; white-space:nowrap; font-family:serif;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="top-bar">
  <h1>⛰ Симулятор вулкана</h1>
  <a href="index.html" id="back-link">← На сайт</a>
</div>
<p id="hint">Тяни для вращения · Щипок для зума</p>

<div id="stats">
  <div class="row"><span class="lbl">Температура</span><span class="val" id="s-temp">—</span></div>
  <div class="row"><span class="lbl">Высота выброса</span><span class="val" id="s-h">—</span></div>
  <div class="row"><span class="lbl">Частиц</span><span class="val" id="s-p">—</span></div>
</div>

<div id="ui">
  <div id="status">Вулкан спокоен</div>
  <div id="ctrl-row">
    <div class="slider-wrap">
      <span class="slider-label">Сила извержения</span>
      <input type="range" id="power-slider" min="1" max="10" value="5">
      <span id="power-val">5 / 10</span>
    </div>
    <button id="erupt-btn" onclick="toggleErupt()">🌋 Извергнуть</button>
    <button id="stop-btn" onclick="stopErupt()">Стоп</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── RENDERER ──
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060301);
scene.fog = new THREE.Fog(0x080300, 35, 95);

const camera = new THREE.PerspectiveCamera(52, 1, 0.1, 200);

function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ── LIGHTS ──
scene.add(new THREE.AmbientLight(0x200A00, 3.0));

const sun = new THREE.DirectionalLight(0xFF8833, 1.8);
sun.position.set(8, 15, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 70;
sun.shadow.camera.left = -18; sun.shadow.camera.right = 18;
sun.shadow.camera.top = 18; sun.shadow.camera.bottom = -18;
scene.add(sun);

scene.add(Object.assign(new THREE.DirectionalLight(0x330800, 1.0), { position: new THREE.Vector3(-6,4,-8) }));

const craterLight = new THREE.PointLight(0xFF5500, 2.0, 14);
craterLight.position.set(0, 12, 0);
scene.add(craterLight);

const lavaLight = new THREE.PointLight(0xFF2200, 1.2, 12);
lavaLight.position.set(0, 1, 0);
scene.add(lavaLight);

// ── GROUND ──
const gnd = new THREE.Mesh(
  new THREE.CylinderGeometry(38, 38, 0.6, 64),
  new THREE.MeshLambertMaterial({ color: 0x0E0400 })
);
gnd.position.y = -0.3; gnd.receiveShadow = true;
scene.add(gnd);

// Lava cracks on ground
for (let i = 0; i < 7; i++) {
  const r = 5 + i * 3.8;
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(r, r + 0.15, 64),
    new THREE.MeshBasicMaterial({ color: 0xFF2200, side: THREE.DoubleSide, transparent: true, opacity: Math.max(0.02, 0.10 - i * 0.01) })
  );
  ring.rotation.x = -Math.PI / 2; ring.position.y = 0.03;
  scene.add(ring);
}

// ── VOLCANO ──
const profilePts = [
  [0.01, 0], [0.5, 0.1], [3.5, 0.3], [6.5, 1.2],
  [7.8, 2.8], [7.2, 4.5], [6.0, 6.3], [4.5, 8.2],
  [3.0, 9.8], [1.8, 11.0], [1.1, 11.7], [0.9, 12.1], [1.1, 12.3]
].map(([x, y]) => new THREE.Vector2(x, y));

const latheGeo = new THREE.LatheGeometry(profilePts, 80);
const posA = latheGeo.attributes.position;
const cArr = new Float32Array(posA.count * 3);
for (let i = 0; i < posA.count; i++) {
  const t = Math.max(0, Math.min(1, posA.getY(i) / 12.3));
  cArr[i*3]   = 0.16 + (1-t)*0.12;
  cArr[i*3+1] = 0.07 + (1-t)*0.04;
  cArr[i*3+2] = 0.03;
}
latheGeo.setAttribute('color', new THREE.BufferAttribute(cArr, 3));
const vol = new THREE.Mesh(latheGeo, new THREE.MeshLambertMaterial({ vertexColors: true }));
vol.castShadow = true; vol.receiveShadow = true;
scene.add(vol);

// Crater disc
const craterDisc = new THREE.Mesh(
  new THREE.CircleGeometry(0.88, 32),
  new THREE.MeshBasicMaterial({ color: 0xFF1100 })
);
craterDisc.rotation.x = -Math.PI/2; craterDisc.position.set(0, 12.32, 0);
scene.add(craterDisc);

// Crater glow sprite
function makeGlowTex() {
  const cv = document.createElement('canvas'); cv.width = cv.height = 128;
  const cx = cv.getContext('2d');
  const g = cx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0, 'rgba(255,220,80,1)');
  g.addColorStop(0.3, 'rgba(255,80,0,0.8)');
  g.addColorStop(1, 'rgba(255,0,0,0)');
  cx.fillStyle = g; cx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(cv);
}
const craterSpriteMat = new THREE.SpriteMaterial({
  map: makeGlowTex(), transparent: true, opacity: 0.5,
  blending: THREE.AdditiveBlending
});
const craterSprite = new THREE.Sprite(craterSpriteMat);
craterSprite.scale.set(6, 6, 1); craterSprite.position.set(0, 12.5, 0);
scene.add(craterSprite);

// Stars
const starV = [];
for (let i = 0; i < 1500; i++) {
  const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1), r = 85+Math.random()*15;
  starV.push(r*Math.sin(ph)*Math.cos(th), Math.abs(r*Math.cos(ph))+3, r*Math.sin(ph)*Math.sin(th));
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starV, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color:0xFFEEDD, size:0.35, transparent:true, opacity:0.55 })));

// ── PARTICLES ──
const MAX_P = 4000;
const pPos  = new Float32Array(MAX_P*3);
const pCol  = new Float32Array(MAX_P*3);
const pSz   = new Float32Array(MAX_P);
const pVx   = new Float32Array(MAX_P);
const pVy   = new Float32Array(MAX_P);
const pVz   = new Float32Array(MAX_P);
const pLife = new Float32Array(MAX_P);
const pMaxL = new Float32Array(MAX_P);
const pType = new Uint8Array(MAX_P);

for (let i = 0; i < MAX_P; i++) { pPos[i*3+1] = -999; }

const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
pGeo.setAttribute('color',    new THREE.BufferAttribute(pCol, 3));
pGeo.setAttribute('size',     new THREE.BufferAttribute(pSz,  1));

// Particle texture (glow dot)
function makeParticleTex() {
  const cv = document.createElement('canvas'); cv.width = cv.height = 64;
  const cx = cv.getContext('2d');
  const g = cx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,   'rgba(255,255,255,1)');
  g.addColorStop(0.2, 'rgba(255,200,60,0.9)');
  g.addColorStop(0.5, 'rgba(255,60,0,0.5)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  cx.fillStyle = g; cx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(cv);
}
function makeSmokeTex() {
  const cv = document.createElement('canvas'); cv.width = cv.height = 128;
  const cx = cv.getContext('2d');
  const g = cx.createRadialGradient(64,64,2,64,64,62);
  g.addColorStop(0,   'rgba(180,165,150,0.55)');
  g.addColorStop(0.45,'rgba(90,80,70,0.25)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  cx.fillStyle = g; cx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(cv);
}

const pMat = new THREE.ShaderMaterial({
  uniforms: { ptex: { value: makeParticleTex() }, stex: { value: makeSmokeTex() } },
  vertexShader: `
    attribute float size;
    attribute vec3 color;
    varying vec3 vCol;
    varying float vSmoke;
    void main(){
      vCol   = color;
      float lum = color.r*0.3 + color.g*0.59 + color.b*0.11;
      vSmoke = lum < 0.25 ? 1.0 : 0.0;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * 280.0 / max(-mv.z, 0.1);
      gl_Position  = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    uniform sampler2D ptex;
    uniform sampler2D stex;
    varying vec3 vCol;
    varying float vSmoke;
    void main(){
      vec4 t = mix(texture2D(ptex, gl_PointCoord), texture2D(stex, gl_PointCoord), vSmoke);
      float brightness = vCol.r + vCol.g + vCol.b;
      if(brightness < 0.01) discard;
      gl_FragColor = vec4(vCol, t.a);
    }
  `,
  transparent: true, depthWrite: false,
  blending: THREE.AdditiveBlending, vertexColors: true
});
scene.add(new THREE.Points(pGeo, pMat));

let pidx = 0;
function spawn(type, x,y,z, vx,vy,vz, life, r,g,b, sz) {
  const i = pidx % MAX_P; pidx++;
  pPos[i*3]=x; pPos[i*3+1]=y; pPos[i*3+2]=z;
  pVx[i]=vx; pVy[i]=vy; pVz[i]=vz;
  pLife[i]=life; pMaxL[i]=life;
  pType[i]=type;
  pCol[i*3]=r; pCol[i*3+1]=g; pCol[i*3+2]=b;
  pSz[i]=sz;
}

// ── LAVA FLOWS ──
const flows = [];
function addFlow(pw) {
  const angle = Math.random()*Math.PI*2;
  const pts = [];
  let fy = 12.0;
  for (let i = 0; i < 26; i++) {
    const frac = i/25;
    const radius = 1.0 + frac*7.5 + (Math.random()-0.5)*0.5;
    pts.push(new THREE.Vector3(
      Math.sin(angle)*radius + (Math.random()-0.5)*0.6,
      fy,
      Math.cos(angle)*radius + (Math.random()-0.5)*0.6
    ));
    fy -= 0.43 + frac*0.18;
  }
  const geo = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 24, 0.12+Math.random()*0.12+pw*0.08, 7, false);
  const mat = new THREE.MeshBasicMaterial({ color: 0xFF3300, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  flows.push({ mesh, mat, age: 0, maxAge: 3+Math.random()*4 });
}

// ── ORBIT CONTROLS ──
let sph = { theta: 0.4, phi: 1.05, r: 30 };
const target = new THREE.Vector3(0, 5, 0);
function applyCam() {
  camera.position.set(
    target.x + sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),
    target.y + sph.r*Math.cos(sph.phi),
    target.z + sph.r*Math.sin(sph.phi)*Math.cos(sph.theta)
  );
  camera.lookAt(target);
}
applyCam();

let drag = false, pm = {x:0,y:0};
canvas.addEventListener('mousedown', e => { drag=true; pm={x:e.clientX,y:e.clientY}; });
window.addEventListener('mouseup', () => drag=false);
window.addEventListener('mousemove', e => {
  if (!drag) return;
  sph.theta -= (e.clientX-pm.x)*0.007;
  sph.phi = Math.max(0.18, Math.min(1.45, sph.phi+(e.clientY-pm.y)*0.006));
  pm = {x:e.clientX,y:e.clientY};
  applyCam();
});
canvas.addEventListener('wheel', e => {
  sph.r = Math.max(10, Math.min(55, sph.r+e.deltaY*0.02));
  applyCam(); e.preventDefault();
}, { passive: false });

let tch = [], tDist = 0;
canvas.addEventListener('touchstart', e => {
  tch = Array.from(e.touches);
  if (tch.length === 2) tDist = Math.hypot(tch[0].clientX-tch[1].clientX, tch[0].clientY-tch[1].clientY);
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  const nt = Array.from(e.touches);
  if (nt.length === 1 && tch.length >= 1) {
    sph.theta -= (nt[0].clientX-tch[0].clientX)*0.008;
    sph.phi = Math.max(0.18, Math.min(1.45, sph.phi+(nt[0].clientY-tch[0].clientY)*0.007));
    applyCam();
  } else if (nt.length === 2) {
    const nd = Math.hypot(nt[0].clientX-nt[1].clientX, nt[0].clientY-nt[1].clientY);
    sph.r = Math.max(10, Math.min(55, sph.r-(nd-tDist)*0.06));
    tDist = nd; applyCam();
  }
  tch = nt; e.preventDefault();
}, { passive: false });

// ── STATE ──
let erupting=false, power=5, eTime=0, flowTimer=0, shake=0;
const slider   = document.getElementById('power-slider');
const powerEl  = document.getElementById('power-val');
const statusEl = document.getElementById('status');
const eBtn     = document.getElementById('erupt-btn');
const sBtn     = document.getElementById('stop-btn');
const statsEl  = document.getElementById('stats');

slider.addEventListener('input', () => { power=+slider.value; powerEl.textContent=power+' / 10'; });

function toggleErupt() {
  if (erupting) { stopErupt(); return; }
  erupting=true; eTime=0;
  eBtn.classList.add('on'); eBtn.textContent='🌋 Извержение!';
  sBtn.classList.add('vis'); statsEl.classList.add('vis');
  statusEl.textContent='Началось извержение!';
}
function stopErupt() {
  erupting=false;
  eBtn.classList.remove('on'); eBtn.textContent='🌋 Извергнуть';
  sBtn.classList.remove('vis'); statsEl.classList.remove('vis');
  statusEl.textContent='Вулкан успокаивается...';
  setTimeout(()=>statusEl.textContent='Вулкан спокоен', 3000);
}

// ── LOOP ──
let last = performance.now(), activeP = 0;
const GRAV = 9.8;

function loop() {
  requestAnimationFrame(loop);
  const now = performance.now();
  const dt  = Math.min((now-last)/1000, 0.05);
  last = now;
  const pw = power/10;

  if (erupting) {
    eTime += dt;

    // Lava blobs
    const lRate = Math.floor(10 + pw*40);
    for (let s = 0; s < lRate; s++) {
      const ang = Math.random()*Math.PI*2;
      const tilt = (0.08 + Math.random()*0.55)*pw + 0.04;
      const spd  = 9 + pw*22 + Math.random()*6;
      spawn(0,
        (Math.random()-0.5)*0.9, 12.3, (Math.random()-0.5)*0.9,
        Math.sin(ang)*tilt*spd*0.45, spd, Math.cos(ang)*tilt*spd*0.45,
        0.8+Math.random()*0.4,
        1.0, 0.55+Math.random()*0.3, 0.03,
        0.5+pw*0.8+Math.random()*0.5
      );
    }
    // Smoke clouds
    const smRate = Math.floor(5+pw*20);
    for (let s = 0; s < smRate; s++) {
      const ang = Math.random()*Math.PI*2;
      const spd = 1.8+pw*4;
      spawn(1,
        (Math.random()-0.5)*1.2, 12.6, (Math.random()-0.5)*1.2,
        Math.sin(ang)*(0.3+Math.random()*0.5), spd, Math.cos(ang)*(0.3+Math.random()*0.5),
        1.2+Math.random()*0.5,
        0.0, 0.0, 0.0,  // color handled in update
        2.5+pw*4+Math.random()*2
      );
    }
    // Ash
    const ashRate = Math.floor(pw*15);
    for (let s = 0; s < ashRate; s++) {
      const ang = Math.random()*Math.PI*2;
      const spd = 5+pw*10+Math.random()*4;
      spawn(2,
        (Math.random()-0.5)*0.6, 12.4, (Math.random()-0.5)*0.6,
        Math.sin(ang)*(0.3+Math.random()*0.5)*spd*0.35, spd*0.75, Math.cos(ang)*(0.3+Math.random()*0.5)*spd*0.35,
        1.0+Math.random()*0.3,
        0.55, 0.5, 0.45,
        0.3+pw*0.35
      );
    }
    // Bright embers
    if (pw > 0.3) {
      const eRate = Math.floor(pw*14);
      for (let s = 0; s < eRate; s++) {
        const ang = Math.random()*Math.PI*2;
        const spd = 14+pw*22;
        spawn(3,
          (Math.random()-0.5)*0.4, 12.3, (Math.random()-0.5)*0.4,
          Math.sin(ang)*(0.15+Math.random()*0.5)*spd*0.3, spd, Math.cos(ang)*(0.15+Math.random()*0.5)*spd*0.3,
          0.6+Math.random()*0.3,
          1.0, 0.9+Math.random()*0.1, 0.3,
          0.18+pw*0.22
        );
      }
    }

    // Lava flows on surface
    flowTimer += dt;
    if (flowTimer > 0.55 - pw*0.32) {
      flowTimer = 0;
      if (flows.length < Math.floor(5+pw*12)) addFlow(pw);
    }

    shake = pw*0.14;
    craterLight.intensity  = 5+pw*10+Math.sin(eTime*14)*pw*2.5;
    craterSpriteMat.opacity = 0.55+pw*0.65+Math.sin(eTime*9)*0.12;
    lavaLight.intensity    = 1.5+pw*2.5;

    document.getElementById('s-temp').textContent = `${900+Math.floor(pw*420)} °C`;
    document.getElementById('s-h').textContent    = `${(1+pw*30).toFixed(1)} км`;
    document.getElementById('s-p').textContent    = activeP;
  } else {
    craterLight.intensity   = Math.max(1.8,  craterLight.intensity - dt*5);
    craterSpriteMat.opacity = Math.max(0.08, craterSpriteMat.opacity - dt*0.9);
    lavaLight.intensity     = Math.max(0.3,  lavaLight.intensity - dt*2);
    shake *= 0.88;
    // Idle breathe
    const t = Date.now()*0.0016;
    craterLight.intensity   = 1.8 + Math.sin(t)*0.7;
    craterSpriteMat.opacity = 0.09 + Math.sin(t)*0.05;
  }

  // ── Update particles ──
  activeP = 0;
  for (let i = 0; i < MAX_P; i++) {
    if (pLife[i] <= 0) { pCol[i*3]=pCol[i*3+1]=pCol[i*3+2]=0; continue; }
    activeP++;

    const type = pType[i];
    let decay, grav;
    switch(type) {
      case 0: decay=0.6+pw*0.3;  grav=GRAV;      break; // lava
      case 1: decay=0.11;         grav=-0.4;      break; // smoke
      case 2: decay=0.30;         grav=3.5;       break; // ash
      case 3: decay=0.70+pw*0.35; grav=GRAV*0.85; break; // ember
      default: decay=0.5; grav=GRAV;
    }

    pLife[i] -= dt*decay;
    pVy[i]   -= grav*dt;
    if (type===1||type===2) {
      pVx[i] += (Math.random()-0.5)*0.5*dt;
      pVz[i] += (Math.random()-0.5)*0.5*dt;
    }
    pPos[i*3]   += pVx[i]*dt;
    pPos[i*3+1] += pVy[i]*dt;
    pPos[i*3+2] += pVz[i]*dt;

    const lf = Math.max(0, pLife[i]);
    if (type===0) {
      // Lava: white-hot → yellow → orange → red → dark
      pCol[i*3]   = lf;
      pCol[i*3+1] = lf*lf*0.5;
      pCol[i*3+2] = 0;
      pSz[i] = Math.max(0.05, pSz[i]-dt*0.35);
    } else if (type===1) {
      // Smoke: dark grey, grows
      const a = lf*0.38;
      pCol[i*3]   = a*1.05;
      pCol[i*3+1] = a*0.9;
      pCol[i*3+2] = a*0.75;
      pSz[i] += dt*2.2;
    } else if (type===2) {
      // Ash: light grey, drifts
      const a = lf*0.55;
      pCol[i*3]   = a*0.75;
      pCol[i*3+1] = a*0.70;
      pCol[i*3+2] = a*0.65;
    } else {
      // Ember: bright white-yellow
      pCol[i*3]   = lf;
      pCol[i*3+1] = lf*0.88;
      pCol[i*3+2] = lf*0.25;
    }
    if (pPos[i*3+1] < -1) pLife[i] = 0;
  }
  pGeo.attributes.position.needsUpdate = true;
  pGeo.attributes.color.needsUpdate    = true;
  pGeo.attributes.size.needsUpdate     = true;

  // ── Lava flows ──
  for (let fi = flows.length-1; fi >= 0; fi--) {
    const f = flows[fi]; f.age += dt;
    const p = f.age/f.maxAge;
    f.mat.opacity = p<0.2 ? p/0.2*0.85 : p>0.65 ? (1-(p-0.65)/0.35)*0.85 : 0.85;
    if (f.age >= f.maxAge) { scene.remove(f.mesh); flows.splice(fi,1); }
  }

  // ── Camera shake ──
  if (shake > 0.004) {
    camera.position.x += (Math.random()-0.5)*shake;
    camera.position.y += (Math.random()-0.5)*shake*0.5;
  }

  renderer.render(scene, camera);
}
loop();
</script>
</body>
</html>
